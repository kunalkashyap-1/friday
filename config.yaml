# ╔═══════════════════════════════════════════╗
# ║        Friday v0.5 — Configuration        ║
# ╚═══════════════════════════════════════════╝

wake_words:
  - "friday"
  - "hey friday"
  - "love"

llm:
  model: "qwen3.5:4b"
  host: "http://localhost:11434"
  temperature: 0.7

stt:
  model_size: "small"
  device: "cuda"        # "cuda" or "cpu"
  compute_type: "int8"

tts:
  lang_code: "b"        # 'b' = British English
  voice: "bf_emma"
  speed: 1.0

vad:
  threshold: 0.5
  silence_duration_ms: 1500

music:
  folder: "D:\\Music"   # ← UPDATE THIS to your music folder
  default_backend: "youtube"

camera:
  device_index: 0

memory:
  max_turns: 50

go_dark_phrases:
  - "go dark"
  - "shut down"
  - "kill switch"
