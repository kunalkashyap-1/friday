# ╔═══════════════════════════════════════════╗
# ║        Friday v0.5 — Configuration        ║
# ╚═══════════════════════════════════════════╝

wake_words:
  - "friday"
  - "hey friday"
  - "love"

llm:
  model: "qwen3.5:2b"
  host: "http://localhost:11434"
  temperature: 0.7
  num_predict: 500

stt:
  model_size: "small.en"
  device: "cuda"        # "cuda" or "cpu"
  compute_type: "int8"

tts:
  lang_code: "b"        # 'b' = British English
  voice: "af_heart"
  speed: 1.0

vad:
  threshold: 0.5
  silence_duration_ms: 1500

music:
  folder: "D:\\Music"   # ← UPDATE THIS to your music folder
  default_backend: "youtube"

camera:
  device_index: 0

memory:
  max_turns: 5

web_search:
  max_results: 3

go_dark_phrases:
  - "go dark"
  - "shut down"
  - "kill switch"

apps:
  vscode: "code"
  spotify: "spotify"
  notepad: "notepad"
  calculator: "calc"
  ollama: "ollama"
  "amazon music": "D:\\Program Files\\WindowsApps\\AmazonMobileLLC.AmazonMusic_9.5.2.0_x86__kc6t79cpj4tp0\\Amazon Music.exe"

